<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS-CORE | THE FUTURE UI</title>
    <style>
        /* إعدادات الخطوط والألوان الأساسية */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');

        :root {
            --primary: #00f3ff;
            --secondary: #7000ff;
            --accent: #ff0055;
            --bg-body: #020205;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-body);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* خلفية السينمائية المتحركة */
        .cyber-bg {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
        }
        #snow-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.4; }

        /* الهيكل الرئيسي للموقع */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* القائمة الجانبية (Sidebar) */
        .sidebar {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card span { display: block; font-size: 0.8rem; color: #888; }
        .stat-card b { font-size: 1.4rem; color: var(--primary); }

        /* منطقة المحتوى الرئيسي */
        .main-view {
            padding: 40px;
            overflow-y: auto;
        }

        /* محرك البحث */
        .search-bar {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 50px;
            color: #fff;
            outline: none;
            font-size: 1rem;
            margin-bottom: 40px;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); }

        /* تبويبات Bento */
        .tabs-bento {
            display: flex; gap: 15px; margin-bottom: 40px;
        }
        .bento-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.4s;
            font-weight: bold;
        }
        .bento-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 10px 25px rgba(0, 243, 255, 0.3);
        }

        /* شبكة الكروت الاحترافية */
        .feed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 20px;
            position: relative;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden;
        }
        .glass-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .glass-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        /* زر الخيارات السري */
        .card-actions {
            position: absolute; top: 15px; left: 15px;
            display: flex; gap: 10px;
            opacity: 0; transition: 0.3s;
        }
        .glass-card:hover .card-actions { opacity: 1; }

        .icon-btn {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
            color: #fff;
            width: 35px; height: 35px;
            border-radius: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: var(--primary); color: #000; }

        /* نظام الردود */
        .reply-bubble {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.1), transparent);
            border-right: 3px solid var(--secondary);
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        /* لوحة إضافة البيانات (المودال) */
        .admin-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center; align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #0a0a0f;
            border: 1px solid var(--primary);
            width: 90%; max-width: 600px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
        }

        input, textarea, select {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
        }
        .btn-main {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        /* إشعارات الحماية */
        .notify-bar {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--accent);
            color: #fff; padding: 15px 30px;
            border-radius: 15px; transform: translateX(200%);
            transition: 0.5s; z-index: 3000;
        }
        .notify-bar.show { transform: translateX(0); }

        .nsfw-blur { filter: blur(40px); transition: 0.5s; cursor: pointer; }
        .nsfw-blur:hover { filter: blur(15px); }

        @media (max-width: 850px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="cyber-bg"></div>
    <canvas id="snow-canvas"></canvas>
    <div id="notif" class="notify-bar">🛑 تنبيه: تم حظر محتوى يحتوي على روابط!</div>

    <div class="layout">
        <aside class="sidebar">
            <div class="brand" onclick="toggleAdmin()">NS-CORE</div>
            
            <div class="stat-card">
                <span>إجمالي العناصر</span>
                <b id="stat-total">0</b>
            </div>
            
            <div style="margin-top: auto;">
                <p style="font-size: 0.7rem; color: #555;">v4.5 GENESIS EDITION</p>
                <p style="font-size: 0.7rem; color: #555;">Designed for Admin</p>
            </div>
        </aside>

        <main class="main-view">
            <input type="text" id="mainSearch" class="search-bar" placeholder="ابحث عن نسخة هكر، سكربت، أو سؤال..." onkeyup="searchEngine()">

            <div class="tabs-bento">
                <button class="bento-btn active" onclick="filterData('all', this)">الكل</button>
                <button class="bento-btn" onclick="filterData('hacks', this)">نسخ هكر</button>
                <button class="bento-btn" onclick="filterData('scripts', this)">سكربتات</button>
                <button class="bento-btn" onclick="filterData('q', this)">أسئلة</button>
            </div>

            <div class="feed-grid" id="feedGrid">
                </div>
        </main>
    </div>

    <div class="admin-modal" id="adminModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px; color: var(--primary);">نظام النشر السحابي</h2>
            <input type="text" id="inTitle" placeholder="العنوان المحفز...">
            <select id="inCat">
                <option value="hacks">نسخة هكر</option>
                <option value="scripts">سكربت برمجيات</option>
                <option value="q">استفسار / سؤال</option>
            </select>
            <textarea id="inDesc" rows="4" placeholder="اكتب التفاصيل هنا (بدون روابط)..."></textarea>
            <input type="file" id="inImg" accept="image/*">
            <div style="margin-bottom: 20px;">
                <input type="checkbox" id="inNsfw" style="width: auto;"> <label>تفعيل وضع التمويه الذكي (+18)</label>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" onclick="processPost()">تأكيد النشر</button>
                <button class="btn-main" onclick="toggleAdmin()" style="background:#222; color:#fff;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        /* --- محرك البيانات CORE ENGINE --- */
        let store = JSON.parse(localStorage.getItem('nscore_v4')) || [];

        function toggleAdmin() {
            const modal = document.getElementById('adminModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function validate(text) {
            const regex = /(https?:\/\/[^\s]+|www\.[^\s]+|[a-z0-9]+\.[a-z]{2,})/gi;
            if (regex.test(text)) {
                const n = document.getElementById('notif');
                n.classList.add('show');
                setTimeout(() => n.classList.remove('show'), 3000);
                return false;
            }
            return true;
        }

        function processPost() {
            const title = document.getElementById('inTitle').value;
            const desc = document.getElementById('inDesc').value;
            const cat = document.getElementById('inCat').value;
            const nsfw = document.getElementById('inNsfw').checked;
            const file = document.getElementById('inImg').files[0];

            if (!validate(title) || !validate(desc)) return;
            if (!title || !desc) return alert("يرجى ملء البيانات!");

            const finalize = (imgData) => {
                store.push({ id: Date.now(), title, desc, cat, nsfw, img: imgData, replies: [] });
                saveAndRender();
                toggleAdmin();
                clearForm();
            };

            if (file) {
                const r = new FileReader();
                r.onload = (e) => finalize(e.target.result);
                r.readAsDataURL(file);
            } else finalize(null);
        }

        function clearForm() {
            document.getElementById('inTitle').value = '';
            document.getElementById('inDesc').value = '';
            document.getElementById('inImg').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('nscore_v4', JSON.stringify(store));
            render();
            document.getElementById('stat-total').innerText = store.length;
        }

        function deleteItem(id) {
            if(confirm("هل أنت متأكد من مسح هذا السجل؟")) {
                store = store.filter(i => i.id !== id);
                saveAndRender();
            }
        }

        function replyItem(id) {
            const msg = prompt("اكتب رد الإدارة الرسمي:");
            if (msg && validate(msg)) {
                store.find(i => i.id === id).replies.push(msg);
                saveAndRender();
            }
        }

        function render(filter = 'all') {
            const grid = document.getElementById('feedGrid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? store : store.filter(i => i.cat === filter);

            filtered.slice().reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.setAttribute('data-title', item.title.toLowerCase());

                const imgHtml = item.img ? `<img src="${item.img}" class="${item.nsfw ? 'nsfw-blur' : ''}" onclick="this.classList.remove('nsfw-blur')">` : '';
                const repliesHtml = item.replies.map(r => `<div class="reply-bubble"><b style="color:var(--secondary); font-size:0.7rem;">ADMIN RESPONSE:</b><br>${r}</div>`).join('');

                card.innerHTML = `
                    <div class="card-actions">
                        <button class="icon-btn" onclick="replyItem(${item.id})">💬</button>
                        <button class="icon-btn" onclick="deleteItem(${item.id})" style="color:var(--accent)">🗑</button>
                    </div>
                    ${imgHtml}
                    <div style="color:var(--primary); font-size:0.7rem; font-weight:900; margin-bottom:10px;">#${item.cat.toUpperCase()}</div>
                    <h2 style="font-size:1.2rem; margin-bottom:10px;">${item.title}</h2>
                    <p style="color:#aaa; font-size:0.9rem;">${item.desc}</p>
                    ${repliesHtml}
                `;
                grid.appendChild(card);
            });
        }

        function filterData(c, btn) {
            document.querySelectorAll('.bento-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c);
        }

        function searchEngine() {
            const term = document.getElementById('mainSearch').value.toLowerCase();
            document.querySelectorAll('.glass-card').forEach(card => {
                const title = card.getAttribute('data-title');
                card.style.display = title.includes(term) ? 'block' : 'none';
            });
        }

        /* --- نظام الثلج النيوني الهادئ --- */
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array(70).fill().map(() => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2 + 1,
                v: Math.random() * 0.5 + 0.1
            }));
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(0, 243, 255, 0.3)";
            ctx.beginPath();
            particles.forEach(p => {
                ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                p.y += p.v; if(p.y > canvas.height) p.y = -10;
            });
            ctx.fill(); requestAnimationFrame(animate);
        }
        window.onresize = init; init(); animate(); saveAndRender();

    </script>
</body>
</html>
